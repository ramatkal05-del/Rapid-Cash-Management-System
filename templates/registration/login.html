<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Rapid Cash</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS (local build) -->
    <link rel="stylesheet" href="{% load static %}{% static 'css/enhanced.css' %}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#07080e',
                            surface1: '#0d0e18',
                            surface2: '#131421',
                            surface3: '#1a1b2e',
                            border: '#252640',
                        },
                        accent: {
                            primary: '#4f8ef7',
                            'primary-hover': '#3a7af5',
                            success: '#00d68f',
                            danger: '#ff5c7a',
                            warning: '#ffb347',
                            purple: '#a78bfa',
                        },
                        text: {
                            main: '#e8eaf6',
                            secondary: '#8b8fa8',
                            muted: '#5a5d7a',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #07080e;
            color: #e8eaf6;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(79, 142, 247, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(167, 139, 250, 0.1) 0%, transparent 50%);
        }

        .login-card {
            background: rgba(13, 14, 24, 0.9);
            border: 1px solid #252640;
            border-radius: 1.5rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-dark {
            background: #131421;
            border: 1px solid #252640;
            color: #e8eaf6;
            transition: all 0.2s ease;
        }

        .input-dark:focus {
            outline: none;
            border-color: #4f8ef7;
            box-shadow: 0 0 0 3px rgba(79, 142, 247, 0.2);
        }

        .input-dark::placeholder {
            color: #5a5d7a;
        }

        .btn-login {
            background: linear-gradient(135deg, #4f8ef7, #3a7af5);
            transition: all 0.2s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(79, 142, 247, 0.4);
        }

        .glow-effect {
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                box-shadow: 0 0 20px rgba(79, 142, 247, 0.3);
            }

            to {
                box-shadow: 0 0 30px rgba(79, 142, 247, 0.5);
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="w-full max-w-md p-8 fade-in">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div
                class="w-16 h-16 rounded-2xl bg-gradient-to-br from-accent-primary to-accent-purple flex items-center justify-center mx-auto mb-4 glow-effect">
                <span class="text-white font-bold text-2xl">R</span>
            </div>
            <h1 class="text-2xl font-bold text-text-main">Rapid Cash</h1>
            <p class="text-text-secondary text-sm mt-1">Système de Gestion Financière</p>
        </div>

        <!-- Login Card -->
        <div class="login-card p-8">
            <h2 class="text-xl font-bold text-text-main mb-6 text-center">Connexion</h2>

            {% if messages %}
            <div class="mb-6">
                {% for message in messages %}
                <div
                    class="p-4 rounded-lg text-sm font-medium bg-accent-danger/10 border border-accent-danger/20 text-accent-danger">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}" class="space-y-5">
                {% csrf_token %}
                {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
                {% endif %}

                <!-- Username -->
                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-2">Nom d'utilisateur</label>
                    <input type="text" name="username" class="input-dark w-full px-4 py-3 rounded-lg"
                        placeholder="Entrez votre nom d'utilisateur" required autocomplete="username">
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-2">Mot de passe</label>
                    <input type="password" name="password" class="input-dark w-full px-4 py-3 rounded-lg"
                        placeholder="••••••••" required>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-login w-full py-3 rounded-lg text-white font-semibold">
                    Se connecter
                </button>
            </form>
        </div>

        <!-- Footer -->
        <p class="text-center text-text-muted text-xs mt-8">
            2026 Rapid Cash. Système Financier.
        </p>
    </div>
</body>

</html>
